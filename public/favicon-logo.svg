<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Same brand routing gradient for identity consistency -->
    <linearGradient id="favicon-route-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  
  <g transform="translate(15, 12)">
    <!-- Bold Calendar Main Plate -->
    <rect x="0" y="8" width="70" height="72" rx="14" fill="#1e293b" />
    
    <!-- Distinct Top Binder Header Bar -->
    <path d="M 0 20 L 70 20 L 70 20 C 70 13.37, 63.63 8, 56 8 L 14 8 C 6.37 8, 0 13.37, 0 20 Z" fill="#334155" />
    
    <!-- Ultra-visible Binder Loops -->
    <rect x="16" y="0" width="8" height="14" rx="4" fill="#64748b" />
    <rect x="46" y="0" width="8" height="14" rx="4" fill="#64748b" />

    <!-- Pure Routing Engine Concept: Smooth curve directly targeting the core center node -->
    <path d="M 12 56 C 24 56, 26 38, 44 38" fill="none" stroke="url(#favicon-route-grad)" stroke-width="7" stroke-linecap="round" />
    
    <!-- High-Contrast Target Hit Slot -->
    <rect x="36" y="30" width="16" height="16" rx="4" fill="none" stroke="#ffffff" stroke-width="3" />
    <circle cx="44" cy="38" r="3.5" fill="#ffffff" />
    
    <!-- Sharp Arrow head punching straight forward and out -->
    <path d="M 44 38 L 78 38" fill="none" stroke="url(#favicon-route-grad)" stroke-width="7" stroke-linecap="round" />
    <path d="M 69 30 L 78 38 L 69 46" fill="none" stroke="url(#favicon-route-grad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
