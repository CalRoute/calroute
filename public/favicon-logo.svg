<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7377;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a5f63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="white" />

  <!-- Main calendar shape -->
  <rect x="40" y="40" width="120" height="120" rx="16" fill="url(#grad)" />

  <!-- Calendar header bar -->
  <rect x="40" y="40" width="120" height="24" rx="16" ry="0" fill="#0a5f63" />

  <!-- Calendar grid lines -->
  <line x1="60" y1="40" x2="60" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <line x1="80" y1="40" x2="80" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <line x1="100" y1="40" x2="100" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <line x1="120" y1="40" x2="120" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <line x1="140" y1="40" x2="140" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="2" />

  <!-- Horizontal lines -->
  <line x1="40" y1="80" x2="160" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" />
  <line x1="40" y1="120" x2="160" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" />

  <!-- Routing dots -->
  <circle cx="70" cy="100" r="4.5" fill="white" opacity="0.85" />
  <circle cx="120" cy="100" r="4.5" fill="white" opacity="0.85" />
  <circle cx="95" cy="145" r="4.5" fill="white" opacity="0.85" />

  <!-- Connecting lines -->
  <path d="M 70 100 Q 95 120 95 145" stroke="white" stroke-width="2" fill="none" opacity="0.65" stroke-linecap="round" />
  <path d="M 120 100 Q 95 120 95 145" stroke="white" stroke-width="2" fill="none" opacity="0.65" stroke-linecap="round" />
</svg>
