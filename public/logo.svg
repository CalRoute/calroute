<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Vibrant gradient for the prominent routing path -->
    <linearGradient id="bold-route-grad-trans" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  
  <g transform="translate(20, 16)">
    <!-- Main Calendar Body Shield -->
    <rect x="0" y="6" width="60" height="62" rx="10" fill="#1e293b" />
    
    <!-- Distinct Calendar Top Header Bar -->
    <path d="M 0 16 L 60 16 L 60 16 C 60 10.47, 55.53 6, 50 6 L 10 6 C 4.47 6, 0 10.47, 0 16 Z" fill="#334155" />
    
    <!-- Calendar Binder Rings/Tabs -->
    <rect x="14" y="0" width="6" height="10" rx="3" fill="#64748b" />
    <rect x="40" y="0" width="6" height="10" rx="3" fill="#64748b" />
    
    <!-- Explicit Grid Layout (Cutouts/Slots inside the calendar) -->
    <!-- Row 1 -->
    <rect x="10" y="24" width="10" height="10" rx="2.5" fill="#0b0f19" opacity="0.6" />
    <rect x="25" y="24" width="10" height="10" rx="2.5" fill="#0b0f19" opacity="0.6" />
    <rect x="40" y="24" width="10" height="10" rx="2.5" fill="#0b0f19" opacity="0.6" />
    
    <!-- Row 2 -->
    <rect x="10" y="39" width="10" height="10" rx="2.5" fill="#0b0f19" opacity="0.6" />
    <rect x="40" y="39" width="10" height="10" rx="2.5" fill="#0b0f19" opacity="0.6" />
    
    <!-- Row 3 -->
    <rect x="10" y="54" width="10" height="10" rx="2.5" fill="#0b0f19" opacity="0.6" />
    <rect x="25" y="54" width="10" height="10" rx="2.5" fill="#0b0f19" opacity="0.6" />
    <rect x="40" y="54" width="10" height="10" rx="2.5" fill="#0b0f19" opacity="0.6" />

    <!-- THE ROUTE: Slices dynamically into the calendar page -->
    <path d="M -6 35 C 4 35, 12 44, 30 44" fill="none" stroke="url(#bold-route-grad-trans)" stroke-width="5" stroke-linecap="round" />
    
    <!-- Targeted Target Slot Highlight -->
    <rect x="25" y="39" width="10" height="10" rx="2.5" fill="none" stroke="#ffffff" stroke-width="2" />
    <circle cx="30" cy="44" r="2.5" fill="#ffffff" />
    
    <!-- Sweeping arrow emerging from the targeted host slot out the side -->
    <path d="M 30 44 L 68 44" fill="none" stroke="url(#bold-route-grad-trans)" stroke-width="5" stroke-linecap="round" />
    <path d="M 61 38 L 68 44 L 61 50" fill="none" stroke="url(#bold-route-grad-trans)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
