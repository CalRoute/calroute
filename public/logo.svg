<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar icon with routing concept -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7377;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a5f63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main calendar shape -->
  <rect x="50" y="50" width="100" height="100" rx="12" fill="url(#grad)" />

  <!-- Calendar header bar -->
  <rect x="50" y="50" width="100" height="20" rx="12" ry="0" fill="#0a5f63" />

  <!-- Calendar grid lines -->
  <line x1="67" y1="50" x2="67" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
  <line x1="84" y1="50" x2="84" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
  <line x1="101" y1="50" x2="101" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
  <line x1="118" y1="50" x2="118" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />

  <!-- Horizontal lines -->
  <line x1="50" y1="80" x2="150" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  <line x1="50" y1="110" x2="150" y2="110" stroke="rgba(255,255,255,0.15)" stroke-width="1" />

  <!-- Routing dots (representing team members) -->
  <circle cx="75" cy="95" r="3.5" fill="white" opacity="0.8" />
  <circle cx="110" cy="95" r="3.5" fill="white" opacity="0.8" />
  <circle cx="93" cy="130" r="3.5" fill="white" opacity="0.8" />

  <!-- Connecting lines (routing) -->
  <path d="M 75 95 Q 93 110 93 130" stroke="white" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round" />
  <path d="M 110 95 Q 93 110 93 130" stroke="white" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round" />
</svg>
