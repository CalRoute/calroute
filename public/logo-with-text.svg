<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7377;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a5f63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Calendar with routing -->
  <g>
    <!-- Main calendar shape -->
    <rect x="20" y="20" width="80" height="80" rx="10" fill="url(#grad)" />

    <!-- Calendar header bar -->
    <rect x="20" y="20" width="80" height="16" rx="10" ry="0" fill="#0a5f63" />

    <!-- Calendar grid lines -->
    <line x1="33" y1="20" x2="33" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" />
    <line x1="46" y1="20" x2="46" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" />
    <line x1="59" y1="20" x2="59" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" />
    <line x1="72" y1="20" x2="72" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" />

    <!-- Horizontal lines -->
    <line x1="20" y1="48" x2="100" y2="48" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" />
    <line x1="20" y1="76" x2="100" y2="76" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" />

    <!-- Routing dots -->
    <circle cx="39" cy="62" r="2.8" fill="white" opacity="0.8" />
    <circle cx="66" cy="62" r="2.8" fill="white" opacity="0.8" />
    <circle cx="52" cy="90" r="2.8" fill="white" opacity="0.8" />

    <!-- Connecting lines -->
    <path d="M 39 62 Q 52 76 52 90" stroke="white" stroke-width="1.2" fill="none" opacity="0.6" stroke-linecap="round" />
    <path d="M 66 62 Q 52 76 52 90" stroke="white" stroke-width="1.2" fill="none" opacity="0.6" stroke-linecap="round" />
  </g>

  <!-- Text: CalRoute -->
  <text x="120" y="75" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">CalRoute</text>
</svg>
